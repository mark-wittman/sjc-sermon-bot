# fly.toml — Fly.io deployment config for SJC Sermon Bot backend
app = "sjc-sermon-bot-api"
primary_region = "den"

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  DATA_DIR = "/data"
  CLAUDE_MODEL = "claude-sonnet-4-5-20250514"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "sermon_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"
